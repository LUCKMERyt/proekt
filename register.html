    <div class="content_regiser">
        <div class="content_main_regiser">
            <form action="" method="post" name="main_form" id="main_form">
                <p>
                <label for="fam">Ведите фамилию</label>
                <input class="form_reg_fam"
                type="text"
                name="your_fam" 
                id="your_fam" 
                placeholder=" фамилию" />
                </p>
                <p>
                <label for="fam">Ведите имя</label>
                <input class="form_reg_name"
                type="text"
                name="your_name" 
                id="your_name" 
                placeholder=" Имя" />
                </p>
                <p>
                <label for="fam">Ведите отчество</label>
                <input class="form_reg_otch"
                type="text"
                name="your_otch" 
                id="your_otch" 
                placeholder=" Отчество" />
                </p>
                <p>
                    <label for="age">Возраст: </label>
                    <input type="number" step="1" min="18" max="100" value="18" id="age" name="age"/>
                </p>
                <p>
                    <label for="email">Email: </label>
                    <input class="form_reg_email" type="email" placeholder="user@gmail.com" id="email" name="email"/>
                </p>
                <p>
                    <label for="phone">Укажите ваш курс</label>
                    <select id="male" name="male">
                        <option value="curs_2">2 курс</option>
                        <option value="curs_3">3 курс</option>
                        <option value="curs_4">4 курс</option>
                    </select>
                </p>
                <p>
                    <input type="radio" value="man" checked name="gender"/>мужской
                </p>
                <p>
                    <input type="radio" value="woman" name="gender"/>женский
                </p>

                <p>
                    <label for="comment">Ваш комментарий:</label><br/>
                    <textarea name="comment" id="comment" placeholder="Не более 200 символов" maxlength="200"></textarea>   
                </p>
                <p>
                    <input type="checkbox" checked name="sogl"/>Даю согласие на обработку персональных данных
                </p>

                <button type="button" id ="btn_otprav" name="btn_otprav">отправить</button>
                
            </form>
